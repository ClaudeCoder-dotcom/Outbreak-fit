<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#13160E" />
    <meta name="description" content="Train for real, level up, and fight zombies. A calisthenics survival RPG." />

    <title>Outbreak Fit</title>

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
      html, body { margin: 0; height: 100%; background: #0C0E07; }
      body {
        overscroll-behavior: none;
        -webkit-user-select: none; user-select: none;
        /* ambient backdrop so the phone-width frame looks intentional on desktop */
        background:
          radial-gradient(1200px 600px at 50% -10%, #1b2113 0%, #0C0E07 60%);
      }
      /* center the app and give it a defined edge on wider screens */
      #root { min-height: 100%; display: flex; justify-content: center; }
      @media (min-width: 520px) {
        #root > div { box-shadow: 0 0 0 1px #2a3019, 0 24px 60px rgba(0,0,0,0.5); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
